<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valencia Empowers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d4a09 0%, #1a6b12 50%, #2d7a1e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: opacity 0.4s ease;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation: blobMove 8s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: blobMove2 10s ease-in-out infinite alternate;
    }
    @keyframes blobMove { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(60px,40px) scale(1.1); } }
    @keyframes blobMove2 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-40px,-60px) scale(1.15); } }
    .loader-container {
      display: flex; flex-direction: column; align-items: center; gap: 28px;
      position: relative; z-index: 1;
    }
    .logo-ring {
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 3px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      animation: float 3s ease-in-out infinite, ringPulse 2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(255,255,255,0.4), 0 20px 40px rgba(0,0,0,0.2);
      position: relative;
    }
    .logo-ring::before {
      content: ''; position: absolute; inset: -8px; border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: rgba(255,255,255,0.7);
      border-right-color: rgba(255,255,255,0.3);
      animation: spin 1.5s linear infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes ringPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3), 0 20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 0 15px rgba(255,255,255,0.05), 0 20px 40px rgba(0,0,0,0.25); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand { text-align: center; }
    .brand h1 {
      font-size: 2.4rem; font-weight: 800; color: #ffffff;
      letter-spacing: -0.5px; text-shadow: 0 2px 20px rgba(0,0,0,0.3);
      animation: fadeSlideUp 0.8s ease forwards; opacity: 0; transform: translateY(20px);
    }
    .brand p {
      font-size: 1rem; color: rgba(255,255,255,0.7); margin-top: 6px;
      letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
      animation: fadeSlideUp 0.8s ease 0.2s forwards; opacity: 0; transform: translateY(20px);
    }
    @keyframes fadeSlideUp { to { opacity: 1; transform: translateY(0); } }
    .progress-wrapper {
      width: 220px;
      animation: fadeSlideUp 0.8s ease 0.4s forwards; opacity: 0; transform: translateY(20px);
    }
    .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: rgba(255,255,255,0.9); border-radius: 10px;
      animation: loadProgress 1.8s ease forwards; width: 0%;
    }
    @keyframes loadProgress { 0% { width:0%; } 40% { width:55%; } 70% { width:80%; } 100% { width:100%; } }
    .dots {
      display: flex; gap: 8px;
      animation: fadeSlideUp 0.8s ease 0.6s forwards; opacity: 0; transform: translateY(20px);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); }
    .dot:nth-child(1) { animation: dotPulse 1.2s ease-in-out 0s infinite; }
    .dot:nth-child(2) { animation: dotPulse 1.2s ease-in-out 0.2s infinite; }
    .dot:nth-child(3) { animation: dotPulse 1.2s ease-in-out 0.4s infinite; }
    @keyframes dotPulse { 0%,100% { opacity:0.3; transform:scale(1); } 50% { opacity:1; transform:scale(1.3); background:white; } }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="logo-ring">🌿</div>
    <div class="brand">
      <h1>Valencia</h1>
      <p>Empowers</p>
    </div>
    <div class="progress-wrapper">
      <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <script>
    setTimeout(() => {
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = "area.html"; }, 400);
    }, 2200);
  </script>
</body>
</html>
